services:
  backend:
    build:
      context: ./backend
    container_name: uika_book-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-初华的书 API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: false
      HOST: 0.0.0.0
      PORT: 8000
      DATA_DIR: ${DATA_DIR:-/app/data}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      DATABASE_URL: ${DATABASE_URL:-}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_TXT_ENCODING: ${DEFAULT_TXT_ENCODING:-utf-8}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      MAX_COVER_SIZE_MB: ${MAX_COVER_SIZE_MB:-10}
    expose:
      - "8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/backups:/app/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: uika_book-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-7234}:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

