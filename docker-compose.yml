services:
  backend:
    build:
      context: ./backend
    container_name: uika_book-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-初华的书 API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: false
      HOST: 0.0.0.0
      PORT: 8000
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATA_DIR: ${DATA_DIR:-/app/data}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      DATABASE_URL: ${DATABASE_URL:-}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_TXT_ENCODING: ${DEFAULT_TXT_ENCODING:-utf-8}
    expose:
      - "8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: uika_book-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-7234}:80"

