<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- theme-color 使用暖纸白（浅色主题默认）：与沉浸阅读风的浅色背景一致。
         暗色主题下由 stores/app-theme.ts 运行时切换为暖灰黑。 -->
    <meta name="theme-color" content="#F7F4ED" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <!-- 内联兜底：确保 CSS 加载完成前页面背景为深色，消除 PWA 启动/刷新时顶部安全区域的白线闪白。
         不用 !important，让外部 CSS 加载后正常覆盖（light 模式恢复浅色，dark 模式保持深色）。 -->
    <style>
      html, body { background-color: #14120F; }
    </style>
    <meta name="apple-mobile-web-app-title" content="初华的书" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>初华的书</title>
    <!-- 引入霞鹜文楷字体：沉浸阅读风的核心字体，提供温暖书卷感 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
